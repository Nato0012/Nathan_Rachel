<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Button Counter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button onclick="buttonClick('surprise')">Surprise Me</button>
<button onclick="buttonClick('disco')">Disco</button>

<div class="container">

<div class="box">
<h3>Surprise Me</h3>
<div id="surpriseBox" class="number">0</div>
</div>

<div class="box">
<h3>Disco</h3>
<div id="discoBox" class="number">0</div>
</div>

<div class="box">
<h3>Uses Remaining</h3>
<div id="usesBox" class="number">10</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
